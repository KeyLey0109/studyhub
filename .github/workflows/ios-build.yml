name: iOS Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Cập nhật lên 3.22.0 để thỏa mãn http 1.6.0 (Dart 3.4.0)
          flutter-version: '3.22.0' 
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          cd ..

      - name: Build iOS (No Sign)
        run: flutter build ios --release --no-codesign

      # Sideloadly cần file .ipa. Bước này nén Runner.app thành Runner.ipa
      - name: Create IPA Structure
        run: |
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r studyhub_app.ipa Payload
          cd ../../..

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-file
          path: build/ios/iphoneos/studyhub_app.ipa